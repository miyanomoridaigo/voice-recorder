<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Recorder</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aws-sdk/2.1692.0/aws-sdk.min.js"></script>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --text-dim: #888;
      --accent: #ff4444;
      --accent-glow: rgba(255, 68, 68, 0.3);
      --success: #4caf50;
      --info: #2196f3;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      text-align: center;
      padding-top: 40px;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 500;
      margin-bottom: 30px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 0.85rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Record Button */
    .rec-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .rec-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .rec-btn .inner {
      width: 50px;
      height: 50px;
      background: var(--accent);
      border-radius: 50%;
      transition: all 0.3s ease;
    }

    .rec-btn.recording {
      border-color: var(--accent);
      box-shadow: 0 0 30px var(--accent-glow);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .rec-btn.recording .inner {
      width: 36px;
      height: 36px;
      border-radius: 6px;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
      50% { box-shadow: 0 0 40px var(--accent-glow); }
    }

    .timer {
      font-size: 2rem;
      font-variant-numeric: tabular-nums;
      font-weight: 300;
      margin-bottom: 24px;
      color: var(--text-dim);
      height: 2.4rem;
    }

    .timer.active { color: var(--accent); }

    .status {
      font-size: 0.85rem;
      color: var(--text-dim);
      min-height: 1.4em;
      margin-bottom: 16px;
      transition: color 0.3s;
    }

    .status.uploading { color: var(--info); }
    .status.success { color: var(--success); }
    .status.error { color: var(--accent); }

    /* File Browser */
    .browser-toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      align-items: center;
    }

    .refresh-btn {
      padding: 6px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .refresh-btn:hover { border-color: var(--info); color: var(--info); }

    .browser-status {
      font-size: 0.75rem;
      color: var(--text-dim);
      flex: 1;
      text-align: right;
    }

    /* Date Group */
    .date-group {
      margin-bottom: 16px;
      text-align: left;
    }

    .date-header {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 6px;
      padding-left: 4px;
    }

    /* File Item */
    .file-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
      transition: border-color 0.2s;
    }

    .file-item:hover { border-color: #444; }

    .file-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .file-name {
      font-size: 0.85rem;
      flex: 1;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-size {
      font-size: 0.7rem;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .file-actions {
      display: flex;
      gap: 4px;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .icon-btn:hover { border-color: var(--info); color: var(--info); }
    .icon-btn.playing { border-color: var(--accent); color: var(--accent); }

    /* Audio player row */
    .audio-row {
      margin-top: 8px;
      display: none;
    }

    .audio-row.open { display: block; }

    .audio-row audio {
      width: 100%;
      height: 36px;
      border-radius: 6px;
    }

    .empty-msg {
      color: var(--text-dim);
      font-size: 0.85rem;
      padding: 40px 0;
    }

    .loading-spinner {
      color: var(--text-dim);
      font-size: 0.85rem;
      padding: 40px 0;
    }

    /* Config Panel */
    .config-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      z-index: 20;
    }

    .config-panel {
      display: none;
      position: fixed;
      top: 50px;
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      width: 320px;
      z-index: 20;
    }

    .config-panel.open { display: block; }

    .config-panel label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
      margin-top: 12px;
    }

    .config-panel label:first-child { margin-top: 0; }

    .config-panel input {
      width: 100%;
      padding: 8px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      font-family: monospace;
    }

    .config-panel .save-btn {
      margin-top: 16px;
      width: 100%;
      padding: 8px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .config-panel .save-btn:hover { opacity: 0.9; }
    .config-panel .note {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 10px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <button class="config-toggle" onclick="toggleConfig()">⚙ 設定</button>
  <div class="config-panel" id="configPanel">
    <label>R2 Bucket Name</label>
    <input type="text" id="cfgBucket" placeholder="voice-recordings">
    <label>Cloudflare Account ID</label>
    <input type="text" id="cfgAccountId" placeholder="1a2b3c4d...">
    <label>R2 Access Key ID</label>
    <input type="text" id="cfgAccessKey" placeholder="R2のAPIトークンから取得">
    <label>R2 Secret Access Key</label>
    <input type="password" id="cfgSecretKey" placeholder="********">
    <label>保存先フォルダ (任意)</label>
    <input type="text" id="cfgPrefix" placeholder="recordings/">
    <button class="save-btn" onclick="saveConfig()">保存</button>
    <p class="note">※ 認証情報はブラウザの localStorage に保存されます。個人利用専用です。</p>
  </div>

  <div class="container">
    <h1>VOICE RECORDER</h1>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('record')">録音</button>
      <button class="tab" onclick="switchTab('files')">ファイル一覧</button>
    </div>

    <!-- Record Tab -->
    <div class="tab-content active" id="tabRecord">
      <div class="timer" id="timer">00:00</div>

      <button class="rec-btn" id="recBtn" onclick="toggleRecording()">
        <div class="inner"></div>
      </button>

      <div class="status" id="status">タップして録音開始</div>
    </div>

    <!-- Files Tab -->
    <div class="tab-content" id="tabFiles">
      <div class="browser-toolbar">
        <button class="refresh-btn" onclick="loadFileList()">↻ 更新</button>
        <span class="browser-status" id="browserStatus"></span>
      </div>
      <div id="fileListContainer">
        <div class="empty-msg">「更新」を押してファイル一覧を取得</div>
      </div>
    </div>
  </div>

  <script>
    // ── State ──
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let timerInterval = null;
    let startTime = 0;
    let currentAudio = null;
    let currentPlayingBtn = null;

    const recBtn = document.getElementById('recBtn');
    const timerEl = document.getElementById('timer');
    const statusEl = document.getElementById('status');

    // ── Tabs ──
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'record' && i === 0) || (tab === 'files' && i === 1));
      });
      document.getElementById('tabRecord').classList.toggle('active', tab === 'record');
      document.getElementById('tabFiles').classList.toggle('active', tab === 'files');
      if (tab === 'files') loadFileList();
    }

    // ── Config ──
    function loadConfig() {
      return {
        bucket: localStorage.getItem('r2_bucket') || '',
        accountId: localStorage.getItem('r2_account_id') || '',
        accessKey: localStorage.getItem('r2_access_key') || '',
        secretKey: localStorage.getItem('r2_secret_key') || '',
        prefix: localStorage.getItem('r2_prefix') || 'recordings/',
      };
    }

    function saveConfig() {
      localStorage.setItem('r2_bucket', document.getElementById('cfgBucket').value.trim());
      localStorage.setItem('r2_account_id', document.getElementById('cfgAccountId').value.trim());
      localStorage.setItem('r2_access_key', document.getElementById('cfgAccessKey').value.trim());
      localStorage.setItem('r2_secret_key', document.getElementById('cfgSecretKey').value.trim());
      localStorage.setItem('r2_prefix', document.getElementById('cfgPrefix').value.trim());
      document.getElementById('configPanel').classList.remove('open');
      setStatus('設定を保存しました', 'success');
    }

    function populateConfigUI() {
      const cfg = loadConfig();
      document.getElementById('cfgBucket').value = cfg.bucket;
      document.getElementById('cfgAccountId').value = cfg.accountId;
      document.getElementById('cfgAccessKey').value = cfg.accessKey;
      document.getElementById('cfgSecretKey').value = cfg.secretKey;
      document.getElementById('cfgPrefix').value = cfg.prefix;
    }

    function toggleConfig() {
      const panel = document.getElementById('configPanel');
      panel.classList.toggle('open');
      if (panel.classList.contains('open')) populateConfigUI();
    }

    function getS3Client() {
      const cfg = loadConfig();
      return new AWS.S3({
        endpoint: `https://${cfg.accountId}.r2.cloudflarestorage.com`,
        accessKeyId: cfg.accessKey,
        secretAccessKey: cfg.secretKey,
        region: 'auto',
        signatureVersion: 'v4',
        s3ForcePathStyle: true,
      });
    }

    // ── Status ──
    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + type;
    }

    // ── Timer ──
    function updateTimer() {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      timerEl.textContent = `${m}:${s}`;
    }

    // ── Recording ──
    async function toggleRecording() {
      if (isRecording) {
        stopRecording();
      } else {
        await startRecording();
      }
    }

    async function startRecording() {
      const cfg = loadConfig();
      if (!cfg.bucket || !cfg.accountId || !cfg.accessKey || !cfg.secretKey) {
        setStatus('⚙ 設定からR2情報を入力してください', 'error');
        document.getElementById('configPanel').classList.add('open');
        populateConfigUI();
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
          ? 'audio/webm;codecs=opus'
          : MediaRecorder.isTypeSupported('audio/webm')
            ? 'audio/webm'
            : '';

        mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
        audioChunks = [];

        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
          uploadToR2(blob);
        };

        mediaRecorder.start(1000);
        isRecording = true;
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 200);
        timerEl.classList.add('active');
        recBtn.classList.add('recording');
        setStatus('録音中...', 'uploading');
      } catch (err) {
        setStatus('マイクへのアクセスが拒否されました', 'error');
        console.error(err);
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      isRecording = false;
      clearInterval(timerInterval);
      timerEl.classList.remove('active');
      recBtn.classList.remove('recording');
      setStatus('アップロード中...', 'uploading');
    }

    // ── R2 Upload ──
    async function uploadToR2(blob) {
      const cfg = loadConfig();
      const s3 = getS3Client();
      const now = new Date();
      const dateStr = now.toISOString().slice(0, 10);
      const timeStr = now.toISOString().slice(11, 19).replace(/:/g, '');
      const ext = blob.type.includes('webm') ? 'webm' : blob.type.includes('ogg') ? 'ogg' : 'bin';
      const key = `${cfg.prefix}${dateStr}/${timeStr}.${ext}`;

      try {
        await s3.upload({ Bucket: cfg.bucket, Key: key, Body: blob, ContentType: blob.type }).promise();
        setStatus('✓ アップロード完了', 'success');
      } catch (err) {
        console.error('Upload error:', err);
        setStatus(`アップロード失敗: ${err.message}`, 'error');
      }

      setTimeout(() => {
        timerEl.textContent = '00:00';
        setTimeout(() => setStatus('タップして録音開始'), 3000);
      }, 500);
    }

    // ── File List ──
    async function loadFileList() {
      const cfg = loadConfig();
      if (!cfg.bucket || !cfg.accountId || !cfg.accessKey || !cfg.secretKey) {
        document.getElementById('fileListContainer').innerHTML =
          '<div class="empty-msg">⚙ 設定からR2情報を入力してください</div>';
        return;
      }

      document.getElementById('fileListContainer').innerHTML =
        '<div class="loading-spinner">読み込み中...</div>';
      document.getElementById('browserStatus').textContent = '';

      const s3 = getS3Client();

      try {
        const data = await s3.listObjectsV2({
          Bucket: cfg.bucket,
          Prefix: cfg.prefix,
          MaxKeys: 500,
        }).promise();

        const files = (data.Contents || [])
          .filter(f => f.Size > 0)
          .sort((a, b) => new Date(b.LastModified) - new Date(a.LastModified));

        if (files.length === 0) {
          document.getElementById('fileListContainer').innerHTML =
            '<div class="empty-msg">録音ファイルがありません</div>';
          document.getElementById('browserStatus').textContent = '0 件';
          return;
        }

        // Group by date
        const groups = {};
        files.forEach(f => {
          const date = new Date(f.LastModified).toLocaleDateString('ja-JP', {
            year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short'
          });
          if (!groups[date]) groups[date] = [];
          groups[date].push(f);
        });

        let html = '';
        for (const [date, items] of Object.entries(groups)) {
          html += `<div class="date-group"><div class="date-header">${date}</div>`;
          items.forEach((f, i) => {
            const fileName = f.Key.split('/').pop();
            const sizeKB = (f.Size / 1024).toFixed(1);
            const time = new Date(f.LastModified).toLocaleTimeString('ja-JP', {
              hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
            const itemId = `file-${date}-${i}`;
            html += `
              <div class="file-item">
                <div class="file-row">
                  <span class="file-name" title="${f.Key}">${time} — ${fileName}</span>
                  <span class="file-size">${sizeKB} KB</span>
                  <div class="file-actions">
                    <button class="icon-btn" id="play-${itemId}" onclick="togglePlay('${f.Key}', '${itemId}')" title="再生">▶</button>
                    <button class="icon-btn" onclick="downloadFile('${f.Key}')" title="ダウンロード">↓</button>
                  </div>
                </div>
                <div class="audio-row" id="audio-${itemId}"></div>
              </div>`;
          });
          html += '</div>';
        }

        document.getElementById('fileListContainer').innerHTML = html;
        document.getElementById('browserStatus').textContent = `${files.length} 件`;
      } catch (err) {
        console.error('List error:', err);
        document.getElementById('fileListContainer').innerHTML =
          `<div class="empty-msg" style="color:var(--accent)">取得失敗: ${err.message}</div>`;
      }
    }

    // ── Play ──
    async function togglePlay(key, itemId) {
      const audioRow = document.getElementById(`audio-${itemId}`);
      const playBtn = document.getElementById(`play-${itemId}`);

      // If already playing this one, stop
      if (currentAudio && currentPlayingBtn === playBtn) {
        currentAudio.pause();
        currentAudio = null;
        currentPlayingBtn.classList.remove('playing');
        currentPlayingBtn.textContent = '▶';
        currentPlayingBtn = null;
        audioRow.classList.remove('open');
        audioRow.innerHTML = '';
        return;
      }

      // Stop any other playing
      if (currentAudio) {
        currentAudio.pause();
        currentPlayingBtn.classList.remove('playing');
        currentPlayingBtn.textContent = '▶';
        const prevRow = currentPlayingBtn.closest('.file-item').querySelector('.audio-row');
        prevRow.classList.remove('open');
        prevRow.innerHTML = '';
        currentAudio = null;
        currentPlayingBtn = null;
      }

      playBtn.textContent = '…';

      try {
        const cfg = loadConfig();
        const s3 = getS3Client();
        const data = await s3.getObject({ Bucket: cfg.bucket, Key: key }).promise();
        const blob = new Blob([data.Body], { type: data.ContentType || 'audio/webm' });
        const url = URL.createObjectURL(blob);

        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = url;
        audio.autoplay = true;

        audioRow.innerHTML = '';
        audioRow.appendChild(audio);
        audioRow.classList.add('open');

        playBtn.textContent = '■';
        playBtn.classList.add('playing');
        currentAudio = audio;
        currentPlayingBtn = playBtn;

        audio.onended = () => {
          playBtn.classList.remove('playing');
          playBtn.textContent = '▶';
          audioRow.classList.remove('open');
          audioRow.innerHTML = '';
          URL.revokeObjectURL(url);
          currentAudio = null;
          currentPlayingBtn = null;
        };
      } catch (err) {
        console.error('Play error:', err);
        playBtn.textContent = '▶';
        alert(`再生失敗: ${err.message}`);
      }
    }

    // ── Download ──
    async function downloadFile(key) {
      try {
        const cfg = loadConfig();
        const s3 = getS3Client();
        const data = await s3.getObject({ Bucket: cfg.bucket, Key: key }).promise();
        const blob = new Blob([data.Body], { type: data.ContentType || 'audio/webm' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = key.split('/').pop();
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      } catch (err) {
        console.error('Download error:', err);
        alert(`ダウンロード失敗: ${err.message}`);
      }
    }

    // ── Init ──
    populateConfigUI();
  </script>
</body>
</html>
